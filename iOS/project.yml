name: Parkmeter
options:
  bundleIdPrefix: com.shimondeitel.parkcost
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Parkmeter:
    type: application
    platform: iOS
    sources:
      - path: Parkmeter
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.parkcost
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Parkmeter/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  ParkmeterTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: ParkmeterTests
      - path: Parkmeter.storekit
    dependencies:
      - target: Parkmeter
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.parkcost.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  ParkmeterUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: ParkmeterUITests
    dependencies:
      - target: Parkmeter
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.parkcost.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Parkmeter:
    build:
      targets:
        Parkmeter: all
        ParkmeterTests: [test]
        ParkmeterUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Parkmeter.storekit
    test:
      config: Debug
      storeKitConfiguration: Parkmeter.storekit
      targets:
        - ParkmeterTests
        - ParkmeterUITests
    archive:
      config: Release
